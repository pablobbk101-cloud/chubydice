<style>
  :root {
    --yellow: #F5C518;
    --white: #FFFFFF;
    --black: #0A0A0A;
    --dark: #111111;
    --border: #242424;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Barlow', sans-serif; background: var(--black); color: var(--white); min-height: 100vh; overflow-x: hidden; }

  /* ─── NAVBAR ─── */
  nav { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; padding: 18px 36px; background: rgba(10,10,10,0.88); backdrop-filter: blur(14px); border-bottom: 1px solid var(--border); }
  .nav-logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; letter-spacing: 0.05em; color: var(--white); text-decoration: none; justify-self: start; }
  .nav-logo span { color: var(--yellow); }
  .nav-center { display: flex; justify-content: center; }
  .nav-right { display: flex; align-items: center; justify-content: flex-end; }
  .menu-btn { background: none; border: none; color: var(--white); font-family: 'Barlow', sans-serif; font-weight: 700; font-size: 0.95rem; letter-spacing: 0.1em; cursor: pointer; display: flex; align-items: center; gap: 6px; text-transform: uppercase; }
  .menu-btn svg { transition: transform 0.3s; }
  .menu-btn.open svg { transform: rotate(180deg); }
  .book-btn { background: var(--yellow); color: var(--black); border: none; font-family: 'Barlow', sans-serif; font-weight: 800; font-size: 0.9rem; padding: 10px 22px; border-radius: 50px; cursor: pointer; text-transform: uppercase; letter-spacing: 0.05em; transition: transform 0.2s, box-shadow 0.2s; }
  .book-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(245,197,24,0.4); }

  /* ─── DROPDOWN ─── */
  .menu-overlay { position: fixed; top: 64px; right: 24px; width: 300px; background: rgba(14,14,14,0.82); backdrop-filter: blur(24px); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; z-index: 999; display: flex; flex-direction: column; padding: 12px; transform: translateY(-10px) scale(0.97); opacity: 0; pointer-events: none; transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1), opacity 0.2s ease; box-shadow: 0 24px 60px rgba(0,0,0,0.6); }
  .menu-overlay.open { transform: translateY(0) scale(1); opacity: 1; pointer-events: all; }
  .menu-overlay a { font-family: 'Barlow', sans-serif; font-weight: 600; font-size: 0.88rem; letter-spacing: 0.04em; text-transform: uppercase; color: rgba(255,255,255,0.75); text-decoration: none; padding: 10px 14px; border-radius: 8px; transition: background 0.15s, color 0.15s; }
  .menu-overlay a:hover { background: rgba(255,255,255,0.06); color: var(--yellow); }
  .menu-overlay a.active { color: var(--yellow); }
  .menu-divider { height: 1px; background: rgba(255,255,255,0.07); margin: 8px 0; }
  .menu-book { background: var(--yellow); color: var(--black); border: none; font-family: 'Barlow', sans-serif; font-weight: 800; font-size: 0.85rem; padding: 12px; border-radius: 8px; cursor: pointer; text-transform: uppercase; letter-spacing: 0.08em; width: 100%; transition: transform 0.15s; }
  .menu-book:hover { transform: scale(1.02); }

  /* ─── MAIN ─── */
  main {
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 100px 24px 60px;
    position: relative; overflow: hidden;
  }

  /* Animated grid background */
  .grid-bg {
    position: absolute; inset: 0; z-index: 0;
    background-image:
      linear-gradient(rgba(245,197,24,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(245,197,24,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%);
  }

  /* Corner accents */
  .corner { position: absolute; width: 80px; height: 80px; z-index: 1; }
  .corner-tl { top: 80px; left: 40px; border-top: 1px solid rgba(245,197,24,0.25); border-left: 1px solid rgba(245,197,24,0.25); }
  .corner-tr { top: 80px; right: 40px; border-top: 1px solid rgba(245,197,24,0.25); border-right: 1px solid rgba(245,197,24,0.25); }
  .corner-bl { bottom: 60px; left: 40px; border-bottom: 1px solid rgba(245,197,24,0.25); border-left: 1px solid rgba(245,197,24,0.25); }
  .corner-br { bottom: 60px; right: 40px; border-bottom: 1px solid rgba(245,197,24,0.25); border-right: 1px solid rgba(245,197,24,0.25); }

  /* Ghost text */
  .ghost-text {
    position: absolute;
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(8rem, 22vw, 18rem);
    letter-spacing: 0.04em;
    line-height: 1;
    color: transparent;
    -webkit-text-stroke: 1px rgba(245,197,24,0.05);
    pointer-events: none; user-select: none;
    white-space: nowrap;
    z-index: 0;
    top: 50%; transform: translateY(-50%);
  }

  /* Content */
  .content {
    position: relative; z-index: 2;
    text-align: center;
    max-width: 600px;
  }

  /* Wrench icon built from CSS */
  .icon-wrap {
    margin: 0 auto 36px;
    width: 72px; height: 72px;
    border: 1px solid rgba(245,197,24,0.2);
    border-radius: 18px;
    display: flex; align-items: center; justify-content: center;
    background: rgba(245,197,24,0.05);
    opacity: 0; animation: fadeUp 0.5s ease 0.1s forwards;
  }

  .eyebrow {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.75rem; font-weight: 700;
    letter-spacing: 0.35em; text-transform: uppercase;
    color: var(--yellow);
    margin-bottom: 16px;
    opacity: 0; animation: fadeUp 0.5s ease 0.2s forwards;
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.8rem, 7vw, 6rem);
    letter-spacing: 0.03em; line-height: 1;
    color: var(--white);
    margin-bottom: 8px;
    opacity: 0; animation: fadeUp 0.5s ease 0.3s forwards;
  }
  h1 span { color: var(--yellow); }

  .subtitle {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(1.4rem, 3.5vw, 2.8rem);
    letter-spacing: 0.06em;
    color: rgba(255,255,255,0.2);
    margin-bottom: 32px;
    opacity: 0; animation: fadeUp 0.5s ease 0.35s forwards;
  }

  .divider {
    width: 40px; height: 1px;
    background: rgba(245,197,24,0.3);
    margin: 0 auto 28px;
    opacity: 0; animation: fadeUp 0.5s ease 0.4s forwards;
  }

  .desc {
    font-size: 1rem; line-height: 1.8;
    color: rgba(255,255,255,0.4);
    margin-bottom: 44px;
    opacity: 0; animation: fadeUp 0.5s ease 0.45s forwards;
  }
  .desc strong { color: rgba(255,255,255,0.7); font-weight: 600; }

  /* Launch pill */
  .launch-pill {
    display: inline-flex; align-items: center; gap: 10px;
    border: 1px solid rgba(245,197,24,0.2);
    border-radius: 50px;
    padding: 12px 24px;
    margin-bottom: 32px;
    opacity: 0; animation: fadeUp 0.5s ease 0.5s forwards;
  }
  .launch-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--yellow);
    animation: pulse 2s ease-in-out infinite;
  }
  .launch-text {
    font-size: 0.82rem; font-weight: 700;
    letter-spacing: 0.15em; text-transform: uppercase;
    color: rgba(255,255,255,0.5);
  }
  .launch-text strong { color: var(--yellow); }

  /* Back link */
  .back-link {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 0.82rem; font-weight: 600; letter-spacing: 0.08em;
    text-transform: uppercase; color: rgba(255,255,255,0.25);
    text-decoration: none;
    transition: color 0.2s;
    opacity: 0; animation: fadeUp 0.5s ease 0.6s forwards;
  }
  .back-link:hover { color: rgba(255,255,255,0.55); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.85); }
  }

  @media (max-width: 640px) {
    section, .hero, .body-section, .location-section { padding-left: 16px !important; padding-right: 16px !important; }
    nav { grid-template-columns: 1fr auto; padding: 14px 20px; }
    .nav-center { display: none; }
    #navBookBtn { display: none; }
    #menuBtnMobile { display: flex !important; }
    .menu-overlay { top: 56px; right: 16px; width: calc(100vw - 32px); }
    .corner { display: none; }
  }
</style>
</head>

<script>
  function toggleMenu() {
    const overlay = document.getElementById('menuOverlay');
    const btn = document.getElementById('menuBtn');
    const btnM = document.getElementById('menuBtnMobile');
    overlay.classList.toggle('open');
    btn.classList.toggle('open');
    btnM.classList.toggle('open');
  }
  document.addEventListener('click', function(e) {
    const overlay = document.getElementById('menuOverlay');
    const btn = document.getElementById('menuBtn');
    const btnM = document.getElementById('menuBtnMobile');
    if (overlay && overlay.classList.contains('open') &&
        !overlay.contains(e.target) && !btn.contains(e.target) && (!btnM || !btnM.contains(e.target))) {
      overlay.classList.remove('open');
      btn.classList.remove('open');
      if (btnM) btnM.classList.remove('open');
    }
  });
</script>
